spring.application.name=stream-helper
server.port=8080

stream-helper.storage.data-dir=./data

stream-helper.ai.provider=ollama
stream-helper.ai.timeout-seconds=120
stream-helper.ai.ollama.base-url=http://localhost:11434
stream-helper.ai.ollama.model=llama3.1:8b
stream-helper.ai.openai.base-url=https://api.openai.com
stream-helper.ai.openai.api-key=
stream-helper.ai.openai.chat-model=gpt-4.1-mini
stream-helper.ai.openai.image-model=gpt-image-1

stream-helper.transcription.provider=whisper-local
stream-helper.transcription.whisper-base-url=http://localhost:9000
stream-helper.transcription.openai.base-url=https://api.openai.com
stream-helper.transcription.openai.api-key=
stream-helper.transcription.openai.model=whisper-1

stream-helper.yt-dlp.command=yt-dlp
stream-helper.ffmpeg.command=ffmpeg

spring.servlet.multipart.max-file-size=2GB
spring.servlet.multipart.max-request-size=2GB
